version: 2
updates:
  - package-ecosystem: cargo
    directory: /src-tauri
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Dhaka
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - rust
    commit-message:
      prefix: deps
      prefix-development: deps(dev)
      include: scope
    groups:
      wasmtime:
        patterns:
          - "wasmtime*"
        update-types:
          - "minor"
          - "patch"
      tauri:
        patterns:
          - "tauri*"
        update-types:
          - "minor"
          - "patch"
      cargo-other:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Dhaka
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - javascript
    commit-message:
      prefix: deps
      prefix-development: deps(dev)
      include: scope
    versioning-strategy: increase
    groups:
      production-deps:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
      development-deps:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: pip
    directory: /ingestion
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Dhaka
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - python
    commit-message:
      prefix: deps
      include: scope
    groups:
      pip-deps:
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: ci
      include: scope
    groups:
      actions-deps:
        patterns:
          - "*"
