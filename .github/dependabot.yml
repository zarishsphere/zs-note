version: 2
updates:
  - package-ecosystem: cargo
    directory: /src-tauri
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Dhaka
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - rust
    commit-message:
      prefix: deps
      prefix-development: deps(dev)
      include: scope

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Dhaka
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - javascript
    commit-message:
      prefix: deps
      prefix-development: deps(dev)
      include: scope
    versioning-strategy: increase

  - package-ecosystem: pip
    directory: /ingestion
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Dhaka
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - python
    commit-message:
      prefix: deps
      include: scope

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: ci
      include: scope
