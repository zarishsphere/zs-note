name: Generate App Icons

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@ac6db6d3c1f721f886538a378a2d73e85697340a # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24

      - name: Generate icons from source
        run: pnpm dlx @tauri-apps/cli icon src-tauri/icon-source.png -o src-tauri/icons

      - name: Commit generated icons
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src-tauri/icons
          git commit -m "chore: generate app icons from source" || echo "Nothing to commit"
          git push
